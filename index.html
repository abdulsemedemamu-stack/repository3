<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Boss To-Do App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>📝 My To-Do List</h1>

      <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter new task..." />
        <button onclick="addTask()">Add</button>
      </div>

      <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
